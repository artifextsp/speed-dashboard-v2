<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario · Proyecto SPEED</title>
  <link rel="stylesheet" href="site.css" />
  <style>
    .quiz-public { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    .quiz-public__back { display: inline-block; margin-bottom: 16px; color: #534AB7; text-decoration: none; }
    .quiz-public__header h1 { font-size: 1.75rem; margin: 0 0 8px; }
    .quiz-public__header p { color: #64748b; margin: 0; line-height: 1.5; }
    .quiz-public__card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }
    .quiz-public__login {
      display: grid;
      gap: 12px;
      max-width: 320px;
    }
    .quiz-public__login input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d0d7de;
      font-size: 1.25rem;
      letter-spacing: 0.12em;
      text-align: center;
      font-family: ui-monospace, monospace;
    }
    .quiz-public__login button,
    .quiz-public__btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #534AB7;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .quiz-public__score {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #f3f4f6;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .quiz-public__question {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 16px;
      line-height: 1.4;
    }
    .quiz-public__question-image {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .quiz-public__options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .quiz-public__option {
      border: none;
      border-radius: 14px;
      padding: 18px 16px;
      color: #fff;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-public__option:disabled { opacity: 0.7; cursor: default; }
    .quiz-public__option-label {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
    }
    .quiz-public__option--a { background: #e21b3c; }
    .quiz-public__option--b { background: #1368ce; }
    .quiz-public__option--c { background: #d89e00; }
    .quiz-public__option--d { background: #26890c; }
    .quiz-public__option.is-selected { outline: 4px solid rgba(255,255,255,0.65); }
    .quiz-public__option.is-correct { box-shadow: 0 0 0 4px #22c55e; }
    .quiz-public__option.is-wrong { opacity: 0.55; }
    .quiz-public__waiting,
    .quiz-public__empty,
    .quiz-public__loading {
      color: #64748b;
      padding: 12px 0;
    }
    .quiz-public__feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }
    .quiz-public__feedback--ok { border-color: #22c55e; background: #ecfdf5; color: #166534; }
    .quiz-public__feedback--bad { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    @media (max-width: 640px) {
      .quiz-public__options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="pv-wrapper">
    <div class="quiz-public">
      <a class="quiz-public__back" href="index.html">← Volver al temario</a>
      <div class="quiz-public__header">
        <h1>Cuestionario en vivo</h1>
        <p>
          Ingresa tu código de 4 dígitos para participar. Solo verás tus puntos acumulados;
          el ranking completo es visible solo para el docente.
        </p>
      </div>
      <div id="quiz-root">
        <p class="quiz-public__loading">Cargando…</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="quiz.js"></script>
</body>
</html>
